name: CI (.NET)

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "tests/**"
      - "*.slnx"
      - ".editorconfig"
      - ".config/**"
      - ".github/workflows/ci-dotnet.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "*.slnx"
      - ".editorconfig"
      - ".config/**"
      - ".github/workflows/ci-dotnet.yml"

jobs:
  lint-format:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet tool restore
      - run: dotnet build -warnaserror
      - run: dotnet csharpier check .

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - name: Run unit tests
        id: tests
        run: |
          set -o pipefail
          dotnet test 2>&1 | tee /tmp/test-out.txt
        continue-on-error: true
      - name: Post failure details to PR
        if: steps.tests.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(tail -c 3000 /tmp/test-out.txt | jq -Rsc '("## dotnet test output\n```\n" + . + "\n```")')
          curl -s -X POST \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/NormandErwan/Accounts/issues/$PR_NUMBER/comments" \
            -d "{\"body\":$BODY}"
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet restore
      - run: dotnet list package --vulnerable --include-transitive

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - name: Run e2e tests
        env:
          E2E_CMB_PERSO_CSV: ${{ secrets.E2E_CMB_PERSO_CSV }}
          E2E_CMB_COMMUN_CSV: ${{ secrets.E2E_CMB_COMMUN_CSV }}
          E2E_FORTUNEO_ZIP: ${{ secrets.E2E_FORTUNEO_ZIP }}
        run: dotnet test --filter "Category=e2e"
