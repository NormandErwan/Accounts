name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev

      - name: Lint & format
        id: lint
        continue-on-error: true
        run: |
          uv run ruff check . 2>&1 | tee ci-output.txt; R1=${PIPESTATUS[0]}
          uv run ruff format --check . 2>&1 | tee -a ci-output.txt; R2=${PIPESTATUS[0]}
          exit $(( R1 != 0 || R2 != 0 ? 1 : 0 ))

      - name: Prepare PR comment
        id: prep
        if: always() && github.event_name == 'pull_request'
        run: |
          STATUS="${{ steps.lint.outcome }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          OUTPUT=$(tail -c 3000 ci-output.txt 2>/dev/null || echo "(no output)")
          DELIM="$(openssl rand -hex 16)"
          {
            echo "body<<$DELIM"
            echo "## Lint & format $ICON"
            echo ""
            echo "<details><summary>Détails</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: ci-lint
          message: ${{ steps.prep.outputs.body }}

      - name: Assert success
        if: always() && steps.lint.outcome == 'failure'
        run: exit 1

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev

      - name: Type check
        id: type_check
        continue-on-error: true
        run: |
          set -o pipefail
          uvx ty check . 2>&1 | tee ci-output.txt

      - name: Prepare PR comment
        id: prep
        if: always() && github.event_name == 'pull_request'
        run: |
          STATUS="${{ steps.type_check.outcome }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          OUTPUT=$(tail -c 3000 ci-output.txt 2>/dev/null || echo "(no output)")
          DELIM="$(openssl rand -hex 16)"
          {
            echo "body<<$DELIM"
            echo "## Type check $ICON"
            echo ""
            echo "<details><summary>Détails</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: ci-type-check
          message: ${{ steps.prep.outputs.body }}

      - name: Assert success
        if: always() && steps.type_check.outcome == 'failure'
        run: exit 1

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev

      - name: Unit tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          uv run pytest tests/ -m "not e2e" --cov=enrich_csv --cov-report=xml -v 2>&1 | tee ci-output.txt

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
        continue-on-error: true

      - name: Prepare PR comment
        id: prep
        if: always() && github.event_name == 'pull_request'
        run: |
          STATUS="${{ steps.tests.outcome }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          OUTPUT=$(tail -c 3000 ci-output.txt 2>/dev/null || echo "(no output)")
          DELIM="$(openssl rand -hex 16)"
          {
            echo "body<<$DELIM"
            echo "## Unit tests $ICON"
            echo ""
            echo "<details><summary>Détails</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: ci-unit-tests
          message: ${{ steps.prep.outputs.body }}

      - name: Assert success
        if: always() && steps.tests.outcome == 'failure'
        run: exit 1

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev

      - name: Security audit
        id: audit
        continue-on-error: true
        run: |
          set -o pipefail
          uv run pip-audit 2>&1 | tee ci-output.txt

      - name: Prepare PR comment
        id: prep
        if: always() && github.event_name == 'pull_request'
        run: |
          STATUS="${{ steps.audit.outcome }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          OUTPUT=$(tail -c 3000 ci-output.txt 2>/dev/null || echo "(no output)")
          DELIM="$(openssl rand -hex 16)"
          {
            echo "body<<$DELIM"
            echo "## Security audit $ICON"
            echo ""
            echo "<details><summary>Détails</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: ci-security
          message: ${{ steps.prep.outputs.body }}

      - name: Assert success
        if: always() && steps.audit.outcome == 'failure'
        run: exit 1

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev

      - name: End-to-end tests
        id: e2e
        continue-on-error: true
        env:
          E2E_CMB_PERSO_CSV: ${{ secrets.E2E_CMB_PERSO_CSV }}
          E2E_CMB_COMMUN_CSV: ${{ secrets.E2E_CMB_COMMUN_CSV }}
          E2E_FORTUNEO_ZIP: ${{ secrets.E2E_FORTUNEO_ZIP }}
        run: |
          set -o pipefail
          uv run pytest tests/e2e/ -m e2e -v 2>&1 | tee ci-output.txt

      - name: Prepare PR comment
        id: prep
        if: always() && github.event_name == 'pull_request'
        run: |
          STATUS="${{ steps.e2e.outcome }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          OUTPUT=$(tail -c 3000 ci-output.txt 2>/dev/null || echo "(no output)")
          DELIM="$(openssl rand -hex 16)"
          {
            echo "body<<$DELIM"
            echo "## End-to-end tests $ICON"
            echo ""
            echo "<details><summary>Détails</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: ci-e2e
          message: ${{ steps.prep.outputs.body }}

      - name: Assert success
        if: always() && steps.e2e.outcome == 'failure'
        run: exit 1
